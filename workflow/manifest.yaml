---
pipeline:
  id: wp3_te
  name: hastings_rd_wes
  assay: rd_wes
  genome_build: GRCh38

entrypoints:
  analysis: workflow/Snakefile
  references: null

layout:
  local_rules_dir: workflow/rules
  local_scripts_dir: workflow/scripts
  schemas_dir: workflow/schemas
  report: report/workflow.rst

rule_groups:
  common: workflow/rules/common.smk
  variant_annotation: workflow/rules/add_ref_to_vcf.smk
  coverage: workflow/rules/coverage.smk
  cnv_export: workflow/rules/exomedepth_export.smk
  peddy: workflow/rules/peddy.smk
  vcf_export: workflow/rules/tsv2vcf.smk

hydra_modules:
  source: config.modules
  loader: hydra_genetics.utils.misc.get_module_snakefile
  local_module_root_config_key: hydra_local_path
  modules:
    - alignment
    - annotation
    - cnv_sv
    - compression
    - filtering
    - misc
    - parabricks
    - prealignment
    - qc
    - references
    - snv_indels

scripts:
  pipeline_specific:
    - workflow/scripts/create_excel.py
  shared_report_candidates:
    - workflow/scripts/create_peddy_fam.py
    - workflow/scripts/create_peddy_mqc_config.py
  shared_tool_candidates:
    - workflow/scripts/exomedepth_export.R
    - workflow/scripts/ref_vcf.py
    - workflow/scripts/tsv2vcf.sh
  naming_notes:
    - sample_order_for_multiqc.py should be aligned with sample_order_multiqc.py used by other pipelines.

harmonization_notes:
  - Keep site config minimal: parent installation path and runtime resources only.
  - Reference file names should come from the common cgu/library layout, not cluster-specific workflow logic.
  - Local rules should be grouped by domain and mirrored in this manifest before larger refactors.
